name: F1 Contribution Race

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/generate-f1-race.js
      - .github/workflows/f1-contribution-race.yml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate-f1-race.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update F1 contribution race"
          file_pattern: dist/f1-race.svg
