<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Development telemetry board</title>
  <desc id="desc">A motorsport telemetry board showing planning, building, testing, reviewing, and shipping as development phases.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0d0f"/>
      <stop offset="1" stop-color="#181a1f"/>
    </linearGradient>
    <pattern id="smallGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#252a31" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="22" fill="url(#smallGrid)" opacity="0.55"/>
  <rect x="34" y="34" width="1132" height="252" rx="18" stroke="#343b45" stroke-width="2"/>

  <text x="64" y="78" fill="#f2f2f2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" letter-spacing="3">DEVELOPMENT TELEMETRY</text>
  <text x="64" y="112" fill="#9aa4b2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">clean inputs / readable modules / steady releases</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    <text x="78" y="170" fill="#c8d0da">PLAN</text>
    <rect x="170" y="152" width="148" height="24" rx="12" fill="#f23d3d"/>
    <text x="78" y="210" fill="#c8d0da">BUILD</text>
    <rect x="170" y="192" width="252" height="24" rx="12" fill="#ffcf33"/>
    <text x="78" y="250" fill="#c8d0da">TEST</text>
    <rect x="170" y="232" width="186" height="24" rx="12" fill="#f2f2f2"/>

    <text x="514" y="170" fill="#c8d0da">REVIEW</text>
    <rect x="624" y="152" width="218" height="24" rx="12" fill="#f23d3d"/>
    <text x="514" y="210" fill="#c8d0da">DEBUG</text>
    <rect x="624" y="192" width="284" height="24" rx="12" fill="#ffcf33"/>
    <text x="514" y="250" fill="#c8d0da">SHIP</text>
    <rect x="624" y="232" width="158" height="24" rx="12" fill="#f2f2f2"/>
  </g>

  <path d="M962 92V260" stroke="#343b45" stroke-width="2"/>
  <path d="M1002 242C1022 178 1050 146 1086 130C1115 117 1130 95 1122 72" stroke="#f2f2f2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1002 242C1022 178 1050 146 1086 130C1115 117 1130 95 1122 72" stroke="#f23d3d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1002" cy="242" r="7" fill="#ffcf33"/>
  <circle cx="1122" cy="72" r="7" fill="#f23d3d"/>
  <text x="994" y="282" fill="#9aa4b2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">race line: iterate</text>
</svg>
