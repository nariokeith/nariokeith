<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">F1 inspired software garage banner</title>
  <desc id="desc">A dark motorsport dashboard style banner with timing lines, track marks, and Keith Justin Nario written across the center.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101113"/>
      <stop offset="0.48" stop-color="#17191c"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f23d3d"/>
      <stop offset="0.5" stop-color="#ff6b35"/>
      <stop offset="1" stop-color="#f23d3d"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#2b2f35" stroke-width="1"/>
    </pattern>
    <pattern id="checks" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#f4f4f4"/>
      <rect x="20" y="20" width="20" height="20" fill="#f4f4f4"/>
      <rect x="20" width="20" height="20" fill="#15171a"/>
      <rect y="20" width="20" height="20" fill="#15171a"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#panel)"/>
  <rect width="1200" height="360" rx="26" fill="url(#grid)" opacity="0.45"/>

  <rect x="54" y="48" width="1092" height="264" rx="22" stroke="#333942" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="54" y="48" width="1092" height="8" rx="4" fill="url(#redline)"/>
  <rect x="54" y="304" width="1092" height="8" rx="4" fill="url(#redline)" opacity="0.88"/>

  <rect x="94" y="88" width="132" height="132" fill="url(#checks)" opacity="0.92"/>
  <rect x="94" y="88" width="132" height="132" stroke="#3d444d" stroke-width="2"/>
  <path d="M94 246H222" stroke="#f23d3d" stroke-width="8" stroke-linecap="round"/>
  <path d="M94 268H178" stroke="#f2f2f2" stroke-width="8" stroke-linecap="round" opacity="0.82"/>

  <path d="M784 118C828 82 900 90 928 130C954 168 923 204 870 196C822 189 794 212 812 238C836 272 925 276 996 234" stroke="#f2f2f2" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M784 118C828 82 900 90 928 130C954 168 923 204 870 196C822 189 794 212 812 238C836 272 925 276 996 234" stroke="#f23d3d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="784" cy="118" r="8" fill="#f23d3d"/>
  <circle cx="996" cy="234" r="8" fill="#ffcf33"/>

  <text x="270" y="118" fill="#b7c0ca" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" letter-spacing="4">PIT WALL // SOFTWARE GARAGE</text>
  <text x="270" y="184" fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800" letter-spacing="1">Keith Justin Nario</text>
  <text x="272" y="224" fill="#f23d3d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">BUILD FAST. DEBUG CLEAN. SHIP STEADY.</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    <text x="272" y="270" fill="#b7c0ca">SECTOR 1</text>
    <rect x="370" y="254" width="118" height="20" rx="10" fill="#f23d3d"/>
    <text x="522" y="270" fill="#b7c0ca">SECTOR 2</text>
    <rect x="620" y="254" width="152" height="20" rx="10" fill="#ffcf33"/>
    <text x="806" y="270" fill="#b7c0ca">SECTOR 3</text>
    <rect x="904" y="254" width="96" height="20" rx="10" fill="#f2f2f2"/>
  </g>
</svg>
